perturbation:
  ros__parameters:
    # Map coordinate frame (must match YAML file in maps/ directory)
    map_origin_x: -9.9
    map_origin_y: -9.33
    map_resolution: 0.05

    # Path to the binary occupancy map (0=free, non-zero=occupied)
    map_file_path: "src/laplace_pathfinder/maps/bookstore_map.npy"

    # Path to the precomputed Laplace potential field
    phi_file_path: "src/laplace_pathfinder/maps/bookstore_map_phi.npy"

    # Inflation radius for new dynamic obstacles
    inflate_radius: 5

    # SOR solver parameters
    sor_max_iters: 2000
    sor_tolerance: 0.001
    sor_omega: 1.7
